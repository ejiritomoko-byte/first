<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>first アプリひろば</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="portal-body">
  <div class="portal-shape portal-shape-a"></div>
  <div class="portal-shape portal-shape-b"></div>

  <main class="portal-shell">
    <section class="portal-hero">
      <p class="portal-eyebrow">こどもむけ アプリ コレクション</p>
      <h1>first アプリひろば</h1>
      <p class="portal-copy">
        このページは、つくったアプリの いりぐちです。
        あそびたいアプリを えらんで、すぐに ひらけます。
      </p>
    </section>

    <section class="portal-grid">
      <article class="portal-card">
        <p class="portal-label">プログラミング</p>
        <h2>はじめてプログラミング</h2>
        <p>
          めいれいを ならべて、ロボットの ピコを ゴールまで みちびく ゲームです。
        </p>
        <a class="portal-button" href="./programming-game/">アプリを ひらく</a>
      </article>

      <article class="portal-card">
        <p class="portal-label">さんすう</p>
        <h2>わくわく算数ゲーム</h2>
        <p>
          たし算と ひき算を 4たくで とく、しょうがくせい むけの クイズゲームです。
        </p>
        <a class="portal-button" href="./math-game/">アプリを ひらく</a>
      </article>
    </section>

    <section class="portal-note">
      <h2>つぎに できること</h2>
      <p>
        このページに あたらしい アプリカードを たしていくと、
        `first` が アプリいちらんとして そだっていきます。
      </p>
    </section>
  </main>
</body>
</html>
